<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WFM — Agent Console</title>
  <script>
    (function(){ const r=sessionStorage.getItem('wfm_role'); if(r!=='agent'&&r!=='manager') location.replace('/'); })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0a09;
      --s1:      #1c1917;
      --s2:      #231f1d;
      --s3:      #292524;
      --border:  #2c2825;
      --border2: #3a3330;
      --text:    #fafaf9;
      --muted:   #78716c;
      --muted2:  #a8a29e;
      --accent:  #f97316;
      --accent2: #fb923c;
      --green:   #4ade80;
      --red:     #f87171;
      --teal:    #2dd4bf;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; font-size: 13px; }

    /* SIDEBAR */
    .sidebar { width: 228px; background: var(--s1); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .logo { padding: 20px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #fff; box-shadow: 0 0 18px rgba(249,115,22,.3); }
    .logo-text { font-size: 16px; font-weight: 800; letter-spacing: -.5px; }
    .logo-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .status-card { margin: 12px 10px; background: var(--s2); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; }
    .status-card label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; display: block; margin-bottom: 8px; }
    .status-card select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px 10px; font-size: 12px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .status-card select:focus { border-color: var(--accent); }
    .status-card select:disabled { opacity: .6; }
    .btns { display: flex; gap: 7px; }
    .btn-on  { flex:1; background: rgba(45,212,191,.12); color: var(--teal); border: 1px solid rgba(45,212,191,.25); border-radius: 7px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-on:hover  { background: rgba(45,212,191,.22); }
    .btn-off { flex:1; background: var(--s1); color: var(--muted2); border: 1px solid var(--border2); border-radius: 7px; padding: 8px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-off:hover { color: var(--text); }
    .status-line { margin-top: 10px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .status-line .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-line.live .dot  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-line.live { color: var(--green); }

    .nav { padding: 6px 8px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; color: var(--muted2); text-decoration: none; font-weight: 500; font-size: 13px; transition: all .12s; cursor: pointer; }
    .nav-item:hover  { background: var(--s2); color: var(--text); }
    .nav-item.active { background: rgba(249,115,22,.1); color: var(--accent2); }
    .nav-item.danger { color: var(--red); }
    .nav-item.danger:hover { background: rgba(248,113,113,.08); }
    .ico { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }

    .sidebar-footer { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .ava { width: 30px; height: 30px; background: linear-gradient(135deg,var(--teal),var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #0c0a09; flex-shrink: 0; }
    .sf-name { font-size: 12px; font-weight: 600; }
    .sf-role { font-size: 11px; color: var(--muted); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { background:var(--s1); border-bottom:1px solid var(--border); height:50px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar h1 { font-size:14px; font-weight:600; }
    .badge { background:var(--accent); color:#fff; border-radius:10px; padding:2px 8px; font-size:11px; font-weight:700; }

    .chat-layout { flex:1; display:flex; overflow:hidden; }

    /* Sessions */
    .sessions { width:272px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--s1); flex-shrink:0; }
    .sessions-title { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; padding:14px 16px 10px; border-bottom:1px solid var(--border); }

    .sess-list { flex:1; overflow-y:auto; }
    .sess-item { padding:13px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; position:relative; }
    .sess-item:hover { background:var(--s2); }
    .sess-item.active { background:rgba(249,115,22,.06); border-left:2px solid var(--accent); }
    .sess-top { display:flex; justify-content:space-between; margin-bottom:4px; }
    .sess-name { font-size:13px; font-weight:600; }
    .sess-time { font-size:11px; color:var(--muted); }
    .sess-prev { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .unread { position:absolute; top:13px; right:14px; background:var(--accent); color:#fff; border-radius:10px; font-size:10px; padding:1px 6px; font-weight:700; }
    .no-sess { padding:28px 16px; text-align:center; color:var(--muted); line-height:1.7; font-size:13px; }

    /* Chat */
    .chat-pane { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .chat-top { background:var(--s1); border-bottom:1px solid var(--border); padding:13px 18px; display:flex; align-items:center; justify-content:space-between; }
    .c-info { display:flex; align-items:center; gap:10px; }
    .c-ava { width:34px; height:34px; background:rgba(249,115,22,.15); color:var(--accent2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
    .c-name { font-size:14px; font-weight:600; }
    .c-sub  { font-size:11px; color:var(--muted); }
    .btn-end { background:rgba(248,113,113,.1); color:var(--red); border:1px solid rgba(248,113,113,.2); border-radius:7px; padding:6px 13px; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; }
    .btn-end:hover { background:rgba(248,113,113,.2); }

    .msgs { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
    .msg-g { display:flex; flex-direction:column; }
    .msg-g.agent { align-items:flex-end; }
    .msg-g.customer { align-items:flex-start; }
    .msg-g.system { align-items:center; }
    .bubble { padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; max-width:66%; }
    .msg-g.agent    .bubble { background:var(--accent); color:#fff; border-bottom-right-radius:3px; }
    .msg-g.customer .bubble { background:var(--s1); color:var(--text); border:1px solid var(--border2); border-bottom-left-radius:3px; }
    .msg-g.system   .bubble { background:var(--s2); color:var(--muted); font-size:11px; border-radius:7px; text-align:center; }
    .msg-meta { font-size:11px; color:var(--muted); margin-top:4px; padding:0 3px; }

    .input-row { padding:13px 18px; border-top:1px solid var(--border); background:var(--s1); display:flex; gap:8px; align-items:flex-end; }
    .input-row textarea { flex:1; background:var(--s2); border:1px solid var(--border2); border-radius:9px; color:var(--text); padding:10px 13px; font-size:13px; font-family:inherit; outline:none; resize:none; height:40px; max-height:110px; line-height:1.4; }
    .input-row textarea:focus { border-color:var(--accent); }
    .send-btn { background:var(--accent); border:none; border-radius:9px; width:40px; height:40px; color:#fff; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .send-btn:hover { background:var(--accent2); }

    .empty-chat { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:var(--muted); }
    .empty-icon { font-size:36px; opacity:.25; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">W</div>
    <div>
      <div class="logo-text">WFM</div>
      <div class="logo-sub">Agent Console</div>
    </div>
  </div>

  <div class="status-card">
    <label>Your Profile</label>
    <select id="ag-sel"><option value="">— Select agent —</option></select>
    <div class="btns">
      <button class="btn-on"  onclick="goOnline()">● Go Online</button>
      <button class="btn-off" onclick="goOffline()">○ Go Offline</button>
    </div>
    <div class="status-line" id="stat-line"><span class="dot"></span>Not connected</div>
  </div>

  <nav class="nav">
    <a class="nav-item active"><span class="ico">🎧</span> My Chats</a>
    <a class="nav-item" href="/customer.html"><span class="ico">💬</span> Customer View</a>
    <a class="nav-item danger" onclick="logout()"><span class="ico">⎋</span> Logout</a>
  </nav>

  <div class="sidebar-footer">
    <div class="ava" id="sb-ava">AG</div>
    <div>
      <div class="sf-name" id="sb-name">Not logged in</div>
      <div class="sf-role">Support Agent</div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>Agent Console</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--muted)">Active chats</span>
      <span class="badge" id="chat-ct">0</span>
    </div>
  </div>

  <div class="chat-layout">
    <div class="sessions">
      <div class="sessions-title">Incoming Chats</div>
      <div class="sess-list" id="sess-list">
        <div class="no-sess">Go online to<br>receive customer chats</div>
      </div>
    </div>
    <div class="chat-pane" id="chat-pane">
      <div class="empty-chat"><div class="empty-icon">🎧</div><div>Select a chat from the left panel</div></div>
    </div>
  </div>
</div>

<script>
  let agId='', agName='', sessId=null, counts={}, timer=null;

  function ini(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function escJ(s){ return String(s).replace(/'/g,"\\'"); }

  async function loadAgents(){
    const r=await fetch('/agents');
    const agents=await r.json();
    const sel=document.getElementById('ag-sel');
    agents.filter(a=>a.status==='active').forEach(a=>{
      const o=document.createElement('option');
      o.value=a.id; o.dataset.name=a.name;
      o.textContent=`${a.name}  —  ${a.site}`;
      sel.appendChild(o);
    });
    const savedId=sessionStorage.getItem('wfm_agent_id');
    if(savedId){ sel.value=savedId; sel.disabled=true; }
    const savedName=sessionStorage.getItem('wfm_name');
    if(savedName){ document.getElementById('sb-name').textContent=savedName; document.getElementById('sb-ava').textContent=ini(savedName); }
  }

  async function goOnline(){
    const sel=document.getElementById('ag-sel');
    if(!sel.value){alert('Select an agent first');return;}
    agId=sel.value; agName=sel.options[sel.selectedIndex]?.dataset?.name||'Agent';
    await fetch('/webhooks/presence',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agentId:agId,state:'online',timestamp:new Date().toISOString()})});
    const sl=document.getElementById('stat-line');
    sl.className='status-line live'; sl.innerHTML=`<span class="dot"></span>${agName} — Online`;
    document.getElementById('sb-name').textContent=agName;
    document.getElementById('sb-ava').textContent=ini(agName);
    if(timer) clearInterval(timer);
    timer=setInterval(poll,1500); poll();
  }

  async function goOffline(){
    if(!agId)return;
    await fetch('/webhooks/presence',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agentId:agId,state:'offline',timestamp:new Date().toISOString()})});
    const sl=document.getElementById('stat-line');
    sl.className='status-line'; sl.innerHTML=`<span class="dot"></span>${agName} — Offline`;
  }

  async function poll(){
    if(!agId)return;
    const r=await fetch(`/chat/agent/${agId}`); if(!r.ok)return;
    const sessions=await r.json();
    renderList(sessions);
    document.getElementById('chat-ct').textContent=sessions.length;
    if(sessId){ const s=sessions.find(x=>x.id===sessId); if(s) renderNew(s); }
  }

  function renderList(sessions){
    const el=document.getElementById('sess-list');
    if(!sessions.length){el.innerHTML='<div class="no-sess">No active chats.<br>Waiting for customers…</div>';return;}
    el.innerHTML=sessions.map(s=>{
      const unread=s.messages.length-(counts[s.id]||0);
      const last=s.messages.length?s.messages[s.messages.length-1].text:'Session started';
      const time=new Date(s.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      return `<div class="sess-item${s.id===sessId?' active':''}" onclick="openSess('${s.id}','${escJ(s.customerName)}')">
        <div class="sess-top"><span class="sess-name">${esc(s.customerName)}</span><span class="sess-time">${time}</span></div>
        <div class="sess-prev">${esc(last.substring(0,44))}${last.length>44?'…':''}</div>
        ${unread>0?`<span class="unread">${unread}</span>`:''}
      </div>`;
    }).join('');
  }

  function openSess(id,name){
    sessId=id; counts[id]=counts[id]||0;
    const pane=document.getElementById('chat-pane');
    pane.innerHTML=`
      <div class="chat-top">
        <div class="c-info">
          <div class="c-ava">${name.slice(0,2).toUpperCase()}</div>
          <div><div class="c-name">${esc(name)}</div><div class="c-sub">Customer</div></div>
        </div>
        <button class="btn-end" onclick="endChat()">End Chat</button>
      </div>
      <div class="msgs" id="msg-area"></div>
      <div class="input-row">
        <textarea id="reply" placeholder="Type your reply…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"
          oninput="this.style.height='40px';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
        <button class="send-btn" onclick="sendReply()">➤</button>
      </div>`;
    poll();
  }

  function renderNew(s){
    const area=document.getElementById('msg-area'); if(!area)return;
    const known=counts[s.id]||0; if(s.messages.length<=known)return;
    s.messages.slice(known).forEach(m=>{
      const d=document.createElement('div');
      d.className=`msg-g ${m.from}`;
      const t=new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      d.innerHTML=`<div class="bubble">${esc(m.text)}</div><div class="msg-meta">${esc(m.senderName)} · ${t}</div>`;
      area.appendChild(d);
    });
    counts[s.id]=s.messages.length;
    area.scrollTop=99999;
  }

  async function sendReply(){
    const inp=document.getElementById('reply');
    const text=inp?.value.trim(); if(!text||!sessId)return;
    inp.value=''; inp.style.height='40px';
    await fetch(`/chat/sessions/${sessId}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:'agent',senderName:agName,text})});
    const area=document.getElementById('msg-area');
    if(area){
      const d=document.createElement('div'); d.className='msg-g agent';
      d.innerHTML=`<div class="bubble">${esc(text)}</div><div class="msg-meta">${esc(agName)} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
      area.appendChild(d); area.scrollTop=99999;
      if(counts[sessId]!==undefined) counts[sessId]++;
    }
  }

  async function endChat(){
    if(!sessId)return;
    await fetch(`/chat/sessions/${sessId}/close`,{method:'POST'});
    sessId=null;
    document.getElementById('chat-pane').innerHTML='<div class="empty-chat"><div class="empty-icon">🎧</div><div>Select a chat from the left panel</div></div>';
    poll();
  }

  function logout(){ sessionStorage.clear(); location.href='/'; }
  loadAgents();
</script>
</body>
</html>
