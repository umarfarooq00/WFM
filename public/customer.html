<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WFM — Customer Support</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0a09;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .page-logo {
      position: fixed; top: 22px; left: 24px;
      display: flex; align-items: center; gap: 9px;
    }
    .pl-mark { width: 30px; height: 30px; background: #f97316; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; color: #fff; }
    .pl-name  { font-size: 14px; font-weight: 800; letter-spacing: -.4px; color: #fafaf9; }

    .back-link {
      position: fixed; top: 26px; right: 24px;
      font-size: 12px; color: #78716c; text-decoration: none;
      display: flex; align-items: center; gap: 5px;
    }
    .back-link:hover { color: #a8a29e; }

    .widget {
      width: 420px;
      background: #1c1917;
      border-radius: 18px;
      border: 1px solid #2c2825;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      overflow: hidden;
    }

    .w-header {
      background: linear-gradient(135deg, #c2600c, #f97316 50%, #fb923c);
      padding: 22px 22px 20px;
      position: relative;
    }
    .w-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .w-brand { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.7); letter-spacing: .3px; }
    .w-online { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,.8); }
    .w-online .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

    .w-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -.4px; }
    .w-sub   { font-size: 13px; color: rgba(255,255,255,.7); margin-top: 4px; }

    /* start form */
    #start { padding: 26px 22px; }
    .form-label { font-size: 10px; font-weight: 600; color: #78716c; text-transform: uppercase; letter-spacing: .6px; display: block; margin-bottom: 6px; }
    .form-input {
      width: 100%; background: #231f1d; border: 1px solid #3a3330;
      border-radius: 9px; color: #fafaf9;
      padding: 11px 14px; font-size: 14px; font-family: inherit;
      outline: none; margin-bottom: 14px; transition: border .15s;
    }
    .form-input:focus { border-color: #f97316; }

    .trust { display: flex; gap: 16px; margin-bottom: 18px; }
    .trust-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #78716c; }

    .start-btn {
      width: 100%; background: #f97316; color: #fff;
      border: none; border-radius: 10px;
      padding: 13px; font-size: 14px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: background .15s; letter-spacing: -.2px;
    }
    .start-btn:hover { background: #fb923c; }

    /* chat */
    #chat { display: none; flex-direction: column; }

    .agent-bar {
      padding: 12px 18px;
      background: #231f1d;
      border-bottom: 1px solid #2c2825;
      display: flex; align-items: center; gap: 10px;
    }
    .agent-ava { width: 32px; height: 32px; background: rgba(249,115,22,.15); color: #fb923c; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .agent-name { font-size: 13px; font-weight: 600; }
    .agent-role { font-size: 11px; color: #78716c; }
    .conn-badge { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; }
    .conn-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .conn-badge.waiting .dot { background: #fbbf24; }
    .conn-badge.waiting     { color: #fbbf24; }
    .conn-badge.connected .dot { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
    .conn-badge.connected   { color: #4ade80; }

    .msgs { min-height: 320px; max-height: 320px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #0c0a09; }
    .msg { display: flex; flex-direction: column; max-width: 74%; }
    .msg.customer { align-self: flex-end; align-items: flex-end; }
    .msg.agent    { align-self: flex-start; align-items: flex-start; }
    .msg.system   { align-self: center; align-items: center; max-width: 88%; }
    .bubble { padding: 10px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg.customer .bubble { background: #f97316; color: #fff; border-bottom-right-radius: 3px; }
    .msg.agent    .bubble { background: #1c1917; color: #fafaf9; border: 1px solid #2c2825; border-bottom-left-radius: 3px; }
    .msg.system   .bubble { background: #1c1917; color: #78716c; font-size: 11px; border-radius: 7px; text-align: center; border: 1px solid #2c2825; }
    .meta { font-size: 11px; color: #78716c; margin-top: 3px; padding: 0 3px; }

    .input-area {
      padding: 13px 16px; border-top: 1px solid #2c2825;
      display: flex; gap: 8px; background: #1c1917;
    }
    .input-area input { flex: 1; background: #231f1d; border: 1px solid #3a3330; border-radius: 22px; color: #fafaf9; padding: 10px 15px; font-size: 13px; font-family: inherit; outline: none; }
    .input-area input:focus { border-color: #f97316; }
    .send-btn { background: #f97316; border: none; border-radius: 50%; width: 40px; height: 40px; color: #fff; font-size: 15px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .send-btn:hover { background: #fb923c; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #3a3330; border-radius: 4px; }
  </style>
</head>
<body>

<div class="page-logo">
  <div class="pl-mark">W</div>
  <div class="pl-name">WFM</div>
</div>

<a class="back-link" href="/">← Back</a>

<div class="widget">
  <div class="w-header">
    <div class="w-header-top">
      <span class="w-brand">WFM Support</span>
      <span class="w-online"><span class="dot"></span> Agents Available</span>
    </div>
    <div class="w-title">How can we help?</div>
    <div class="w-sub" id="hdr-sub">Start a live chat — we typically reply in under 2 min</div>
  </div>

  <!-- Start form -->
  <div id="start">
    <label class="form-label">Your Name</label>
    <input class="form-input" id="cname" type="text" placeholder="Enter your full name" />

    <label class="form-label">Topic (optional)</label>
    <input class="form-input" id="topic" type="text" placeholder="e.g. Billing, Account, Technical…" />

    <div class="trust">
      <span class="trust-item">🔒 Secure</span>
      <span class="trust-item">⚡ Fast response</span>
      <span class="trust-item">🌍 24 / 7</span>
    </div>

    <button class="start-btn" onclick="startChat()">Start Live Chat →</button>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div class="agent-bar">
      <div class="agent-ava" id="ag-ava">?</div>
      <div>
        <div class="agent-name" id="ag-name">Connecting…</div>
        <div class="agent-role">Support Agent</div>
      </div>
      <div class="conn-badge waiting" id="conn-badge"><span class="dot"></span> Waiting</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-area">
      <input type="text" id="msg-inp" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
  let sessId=null, cname='', lastCt=0, pt=null;

  function ini(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

  async function startChat(){
    cname=document.getElementById('cname').value.trim();
    if(!cname){ document.getElementById('cname').focus(); return; }
    const r=await fetch('/chat/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerName:cname})});
    if(!r.ok)return;
    const s=await r.json(); sessId=s.id;
    document.getElementById('start').style.display='none';
    const ch=document.getElementById('chat'); ch.style.display='flex'; ch.style.flexDirection='column';
    if(s.assignedAgentName){
      setConnected(s.assignedAgentName);
      appendSys(`You're connected with ${s.assignedAgentName}. How can we help you today?`);
    } else {
      appendSys('Looking for an available agent. Please hold on a moment…');
    }
    pt=setInterval(poll,1500);
  }

  async function poll(){
    if(!sessId)return;
    const r=await fetch(`/chat/sessions/${sessId}`); if(!r.ok)return;
    const s=await r.json();
    if(s.assignedAgentName && document.getElementById('ag-name').textContent==='Connecting…'){
      setConnected(s.assignedAgentName);
    }
    if(s.messages.length>lastCt){
      s.messages.slice(lastCt).forEach(m=>{if(m.from==='agent') appendMsg('agent',m.senderName,m.text,m.timestamp);});
      lastCt=s.messages.length;
    }
  }

  function setConnected(name){
    document.getElementById('ag-ava').textContent=ini(name);
    document.getElementById('ag-name').textContent=name;
    document.getElementById('hdr-sub').textContent=`Connected with ${name}`;
    const b=document.getElementById('conn-badge');
    b.className='conn-badge connected';
    b.innerHTML='<span class="dot"></span> Connected';
  }

  async function sendMsg(){
    const inp=document.getElementById('msg-inp');
    const text=inp.value.trim(); if(!text||!sessId)return;
    inp.value='';
    appendMsg('customer',cname,text,new Date().toISOString()); lastCt++;
    await fetch(`/chat/sessions/${sessId}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:'customer',senderName:cname,text})});
  }

  function appendMsg(role,name,text,ts){
    const d=document.createElement('div'); d.className=`msg ${role}`;
    const t=new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    d.innerHTML=`<div class="bubble">${esc(text)}</div><div class="meta">${esc(name)} · ${t}</div>`;
    document.getElementById('msgs').appendChild(d);
    document.getElementById('msgs').scrollTop=99999;
  }

  function appendSys(text){
    const d=document.createElement('div'); d.className='msg system';
    d.innerHTML=`<div class="bubble">${esc(text)}</div>`;
    document.getElementById('msgs').appendChild(d);
  }
</script>
</body>
</html>
