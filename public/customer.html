<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShiftSync — Live Support</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d0f1a 0%, #111827 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* floating badge */
    .brand {
      position: fixed;
      top: 24px; left: 24px;
      display: flex; align-items: center; gap: 8px;
      color: #fff;
    }
    .brand-icon { width: 28px; height: 28px; background: #5b6ef5; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .brand-name  { font-size: 14px; font-weight: 700; }
    .brand-name span { color: #7b8ff7; }

    /* chat widget */
    .widget {
      width: 400px;
      background: #111318;
      border-radius: 20px;
      border: 1px solid #1f2333;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(91,110,245,.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .widget-header {
      background: linear-gradient(135deg, #5b6ef5, #7b8ff7);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-text h2   { font-size: 15px; font-weight: 700; color: #fff; }
    .header-text p    { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 2px; }
    .header-status    { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,.7); }
    .header-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

    /* start form */
    #start-screen { padding: 28px 24px; }
    .form-title   { font-size: 16px; font-weight: 700; color: #e8eaf0; margin-bottom: 6px; }
    .form-sub     { font-size: 13px; color: #5a6282; margin-bottom: 20px; line-height: 1.5; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: #5a6282; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: #181b22;
      border: 1px solid #1f2333;
      border-radius: 9px;
      color: #e8eaf0;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border .2s;
    }
    .form-group input:focus { border-color: #5b6ef5; }

    .btn-start {
      width: 100%;
      background: #5b6ef5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      margin-top: 4px;
    }
    .btn-start:hover { background: #7b8ff7; }

    .trust-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
    .trust-item { font-size: 11px; color: #5a6282; display: flex; align-items: center; gap: 5px; }

    /* chat area */
    #chat-screen { display: none; flex-direction: column; }

    .messages {
      min-height: 340px;
      max-height: 340px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #0d0f1a;
    }

    .msg { display: flex; flex-direction: column; max-width: 75%; }
    .msg.customer { align-self: flex-end; align-items: flex-end; }
    .msg.agent    { align-self: flex-start; align-items: flex-start; }
    .msg.system   { align-self: center; align-items: center; max-width: 90%; }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
    }
    .msg.customer .bubble { background: #5b6ef5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.agent    .bubble { background: #181b22; color: #e8eaf0; border: 1px solid #1f2333; border-bottom-left-radius: 4px; }
    .msg.system   .bubble { background: #181b22; color: #5a6282; font-size: 11px; border-radius: 8px; text-align: center; border: 1px solid #1f2333; }

    .msg .meta { font-size: 11px; color: #5a6282; margin-top: 3px; padding: 0 4px; }

    /* agent typing indicator */
    .typing-row { padding: 6px 16px 0; min-height: 22px; font-size: 11px; color: #5a6282; }

    .input-row {
      padding: 12px 16px;
      border-top: 1px solid #1f2333;
      display: flex;
      gap: 8px;
      background: #111318;
    }
    .input-row input {
      flex: 1;
      background: #181b22;
      border: 1px solid #1f2333;
      border-radius: 24px;
      color: #e8eaf0;
      padding: 10px 16px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .input-row input:focus { border-color: #5b6ef5; }
    .send-btn {
      background: #5b6ef5;
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover { background: #7b8ff7; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1f2333; border-radius: 4px; }
  </style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">⚡</div>
  <div class="brand-name">Shift<span>Sync</span></div>
</div>

<div class="widget">
  <div class="widget-header">
    <div class="header-avatar">🎧</div>
    <div class="header-text">
      <h2>Live Support</h2>
      <p id="agent-line">Powered by ShiftSync WFM</p>
    </div>
    <div class="header-status" id="header-status">
      <span class="dot"></span> Online
    </div>
  </div>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="form-title">How can we help you?</div>
    <div class="form-sub">Start a live chat with one of our support agents. Average response time is under 2 minutes.</div>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="customer-name" placeholder="Enter your full name" />
    </div>
    <div class="form-group">
      <label>Topic (optional)</label>
      <input type="text" id="topic" placeholder="e.g. Billing, Technical issue…" />
    </div>

    <button class="btn-start" onclick="startChat()">Start Live Chat →</button>

    <div class="trust-row">
      <div class="trust-item">🔒 Secure</div>
      <div class="trust-item">⚡ Fast response</div>
      <div class="trust-item">🌍 24/7 Support</div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div class="messages" id="messages"></div>
    <div class="typing-row" id="typing-row"></div>
    <div class="input-row">
      <input type="text" id="msg-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
  let sessionId = null, customerName = '', lastCount = 0, pollTimer = null;

  async function startChat() {
    customerName = document.getElementById('customer-name').value.trim();
    if (!customerName) { document.getElementById('customer-name').focus(); return; }

    const res = await fetch('/chat/sessions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ customerName })
    });
    if (!res.ok) return;
    const session = await res.json();
    sessionId = session.id;

    document.getElementById('start-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex'; cs.style.flexDirection = 'column';

    if (session.assignedAgentName) {
      document.getElementById('agent-line').textContent = `Connected with ${session.assignedAgentName}`;
      appendSystem(`You're connected with ${session.assignedAgentName}. How can we help?`);
    } else {
      document.getElementById('agent-line').textContent = 'Waiting for an agent…';
      document.getElementById('header-status').innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:#f59e0b;display:inline-block;margin-right:5px"></span> Waiting';
      appendSystem('All agents are busy. You\'re in queue — please wait a moment.');
    }

    pollTimer = setInterval(poll, 1500);
  }

  async function poll() {
    if (!sessionId) return;
    const res = await fetch(`/chat/sessions/${sessionId}`);
    if (!res.ok) return;
    const s = await res.json();

    if (s.assignedAgentName && document.getElementById('agent-line').textContent.includes('Waiting')) {
      document.getElementById('agent-line').textContent = `Connected with ${s.assignedAgentName}`;
      document.getElementById('header-status').innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;display:inline-block;margin-right:5px"></span> Online';
    }

    if (s.messages.length > lastCount) {
      s.messages.slice(lastCount).forEach(m => {
        if (m.from === 'agent') appendMsg('agent', m.senderName, m.text, m.timestamp);
      });
      lastCount = s.messages.length;
    }
  }

  async function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !sessionId) return;
    input.value = '';

    appendMsg('customer', customerName, text, new Date().toISOString());
    lastCount++;

    await fetch(`/chat/sessions/${sessionId}/messages`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ from: 'customer', senderName: customerName, text })
    });
  }

  function appendMsg(role, name, text, ts) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const time = new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div><div class="meta">${escHtml(name)} · ${time}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 99999;
  }

  function appendSystem(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    document.getElementById('messages').appendChild(div);
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
